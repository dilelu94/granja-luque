name: CD (Deploy to Oracle Server)

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install build dependencies
      run: npm run install:all

    - name: Build frontend
      run: npm run build:frontend

    - name: Deploy files to production directory
      run: |
        rsync -av --delete \
          --exclude='node_modules' \
          --exclude='database.sqlite*' \
          --exclude='.env' \
          --exclude='.git' \
          --exclude='gemini.md' \
          ./ /home/ubuntu/granja-luque/

    - name: Install production dependencies in deploy path
      run: |
        cd /home/ubuntu/granja-luque
        npm install --omit=dev && npm install --omit=dev --prefix backend

    - name: Restart or start the application using PM2
      run: |
        cd /home/ubuntu/granja-luque
        pm2 restart granja-app || pm2 start backend/server.js --name granja-app

