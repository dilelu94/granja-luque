name: CD (Deploy to Oracle Server)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          # 1. Navegar al directorio de despliegue en el servidor Oracle Cloud
          cd ${{ secrets.SERVER_DEPLOY_PATH }}
          
          # 2. Descargar últimos cambios
          git pull origin main
          
          # 3. Instalar dependencias globales, de backend y frontend
          npm run install:all
          
          # 4. Compilar frontend de producción
          npm run build:frontend
          
          # 5. Reiniciar o arrancar la aplicación usando PM2
          pm2 restart granja-app || pm2 start backend/server.js --name granja-app
